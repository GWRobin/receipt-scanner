version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: receipt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-receipts_db}
      POSTGRES_USER: ${POSTGRES_USER:-receipt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-receipt_user} -d ${POSTGRES_DB:-receipts_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: receipt_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-receipt_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-receipts_db}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENABLE_AUTH: ${ENABLE_AUTH:-false}    # Sätt till "true" för Authelia ForwardAuth
      IMAGE_MAX_PX: ${IMAGE_MAX_PX:-1600}  # Max pixlar på längsta sida (default 1600)
      IMAGE_QUALITY: ${IMAGE_QUALITY:-72}  # JPEG-kvalitet 1–95 (default 72)
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    container_name: receipt_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
